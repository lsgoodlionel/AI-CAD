apiVersion: apps/v1
kind: Deployment
metadata:
  name: cad-web
  namespace: cad
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cad-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: cad-web
    spec:
      containers:
        - name: web
          image: cad-web:latest    # Nginx serving dist/
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cad-web-svc
  namespace: cad
spec:
  selector:
    app: cad-web
  ports:
    - port: 80
      targetPort: 80
