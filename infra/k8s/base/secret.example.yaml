# 将此文件复制为 secret.yaml，填入 base64 编码值后 kubectl apply
# 生成 base64: echo -n "your-value" | base64
# 注意: secret.yaml 已加入 .gitignore，不要提交明文密钥

apiVersion: v1
kind: Secret
metadata:
  name: cad-secret
  namespace: cad
type: Opaque
data:
  # 数据库密码: base64("strong-db-password")
  DB_PASSWORD: <BASE64_ENCODED>

  # MinIO 凭据
  MINIO_ACCESS_KEY: <BASE64_ENCODED>
  MINIO_SECRET_KEY: <BASE64_ENCODED>

  # JWT 签名密钥（至少 32 字节随机串）
  JWT_SECRET: <BASE64_ENCODED>

  # LLM API Keys（按需填写，未配置的引擎自动跳过）
  ANTHROPIC_API_KEY: <BASE64_ENCODED>
  OPENAI_API_KEY: <BASE64_ENCODED>
  DEEPSEEK_API_KEY: <BASE64_ENCODED>

  # 企业微信 Webhook（可选）
  WECHAT_WEBHOOK_URL: <BASE64_ENCODED>
