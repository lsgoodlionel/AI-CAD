apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cad-ingress
  namespace: cad
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "200m"        # 支持大图纸上传
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"       # AI 审图需要较长超时
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"         # cert-manager 自动申请证书
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - cad.example.com
      secretName: cad-tls-secret
  rules:
    - host: cad.example.com
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: cad-api-svc
                port:
                  number: 8000
          - path: /health
            pathType: Exact
            backend:
              service:
                name: cad-api-svc
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cad-web-svc
                port:
                  number: 80
