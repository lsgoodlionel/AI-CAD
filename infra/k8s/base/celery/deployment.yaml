apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: cad
spec:
  replicas: 2
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
        - name: worker
          image: cad-api:latest
          command:
            - celery
            - -A
            - core.celery_app.celery_app
            - worker
            - --loglevel=info
            - --concurrency=4
            - -Q
            - celery,ai_review,regulation_import
          envFrom:
            - configMapRef:
                name: cad-config
            - secretRef:
                name: cad-secret
          env:
            - name: DATABASE_URL
              value: postgresql://cad_user:$(DB_PASSWORD)@postgres-svc:5432/cad_db
            - name: REDIS_URL
              value: redis://redis-svc:6379/0
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "3Gi"
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - core.celery_app.celery_app
                - inspect
                - ping
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: cad
spec:
  replicas: 1    # beat 必须单实例
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      containers:
        - name: beat
          image: cad-api:latest
          command:
            - celery
            - -A
            - core.celery_app.celery_app
            - beat
            - --loglevel=info
            - --scheduler=celery.beat:PersistentScheduler
          envFrom:
            - configMapRef:
                name: cad-config
            - secretRef:
                name: cad-secret
          env:
            - name: DATABASE_URL
              value: postgresql://cad_user:$(DB_PASSWORD)@postgres-svc:5432/cad_db
            - name: REDIS_URL
              value: redis://redis-svc:6379/0
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          volumeMounts:
            - name: beat-schedule
              mountPath: /app/celerybeat-schedule
      volumes:
        - name: beat-schedule
          emptyDir: {}
