apiVersion: v1
kind: Service
metadata:
  name: cad-api-svc
  namespace: cad
spec:
  selector:
    app: cad-api
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cad-api-hpa
  namespace: cad
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cad-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
