services:
  postgres:
    image: apache/age:release_PG16_1.5.0
    container_name: cad_postgres
    environment:
      POSTGRES_DB: cad_db
      POSTGRES_USER: cad_user
      POSTGRES_PASSWORD: cad_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_pg16_data:/var/lib/postgresql/data
      - ./init-age.sql:/docker-entrypoint-initdb.d/01-init-age.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cad_user -d cad_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cad_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: cad_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cad_minio
      MINIO_ROOT_PASSWORD: cad_minio_pass
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:latest
    container_name: cad_chroma
    ports:
      - "8100:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      CHROMA_SERVER_HTTP_PORT: "8000"
      ANONYMIZED_TELEMETRY: "false"

  # MinIO 自动建桶（依赖 minio 健康后执行）
  minio-init:
    image: minio/mc:latest
    container_name: cad_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 cad_minio cad_minio_pass;
        mc mb --ignore-existing local/drawings;
        mc mb --ignore-existing local/reports;
        mc mb --ignore-existing local/atlases;
        echo 'MinIO buckets ready';
      "
    restart: "no"

  api:
    build:
      # 上下文为 apps/：镜像需同时打包 api 与 sibling 的 model-convert（IFC→Fragments）
      context: ../apps
      dockerfile: api/Dockerfile
    image: cad-api:local
    container_name: cad_api
    profiles: ["app"]
    environment:
      DATABASE_URL: postgresql://cad_user:cad_pass@postgres:5432/cad_db
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: cad_minio
      MINIO_SECRET_KEY: cad_minio_pass
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
      JWT_SECRET: change-me-in-production
      # DWG→DXF 转换：手动安装 ODA File Converter（Linux ARM AppImage 解包）后
      # 挂载到 /opt/oda 并设 ODA_CONVERTER_PATH（见 docs/BATCH_REVIEW_BLUEPRINT.md 4.3）
      ODA_CONVERTER_PATH: ${ODA_CONVERTER_PATH:-}
    # volumes:
    #   - ./oda:/opt/oda:ro   # 放入解包后的 ODAFileConverter 可执行文件
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      chroma:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 300s

  celery-worker:
    image: cad-api:local
    container_name: cad_celery_worker
    profiles: ["app"]
    environment:
      DATABASE_URL: postgresql://cad_user:cad_pass@postgres:5432/cad_db
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: cad_minio
      MINIO_SECRET_KEY: cad_minio_pass
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
      JWT_SECRET: change-me-in-production
      ODA_CONVERTER_PATH: ${ODA_CONVERTER_PATH:-}
    # volumes:
    #   - ./oda:/opt/oda:ro   # 同 api：DWG 转换需挂载 ODA File Converter
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A core.celery_app worker --loglevel=info -Q default,ai_review,regulation_import

  celery-beat:
    image: cad-api:local
    container_name: cad_celery_beat
    profiles: ["app"]
    environment:
      DATABASE_URL: postgresql://cad_user:cad_pass@postgres:5432/cad_db
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: cad_minio
      MINIO_SECRET_KEY: cad_minio_pass
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
      JWT_SECRET: change-me-in-production
    depends_on:
      redis:
        condition: service_healthy
    command: >
      celery -A core.celery_app beat --loglevel=info

  web:
    build:
      context: ../apps/web
    image: cad-web:local
    container_name: cad_web
    profiles: ["app"]
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # 可选：本地 Ollama（用于测试本地模型）
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: cad_ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama

volumes:
  postgres_pg16_data:
  redis_data:
  minio_data:
  chroma_data:
  # ollama_data:
