version: "3.9"

services:
  postgres:
    image: apache/age:PG16
    container_name: cad_postgres
    environment:
      POSTGRES_DB: cad_db
      POSTGRES_USER: cad_user
      POSTGRES_PASSWORD: cad_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-age.sql:/docker-entrypoint-initdb.d/01-init-age.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cad_user -d cad_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cad_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: cad_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cad_minio
      MINIO_ROOT_PASSWORD: cad_minio_pass
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:latest
    container_name: cad_chroma
    ports:
      - "8100:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      CHROMA_SERVER_HTTP_PORT: "8000"
      ANONYMIZED_TELEMETRY: "false"

  # MinIO 自动建桶（依赖 minio 健康后执行）
  minio-init:
    image: minio/mc:latest
    container_name: cad_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 cad_minio cad_minio_pass;
        mc mb --ignore-existing local/drawings;
        mc mb --ignore-existing local/reports;
        mc mb --ignore-existing local/atlases;
        echo 'MinIO buckets ready';
      "
    restart: "no"

  # 可选：本地 Ollama（用于测试本地模型）
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: cad_ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama

volumes:
  postgres_data:
  redis_data:
  minio_data:
  chroma_data:
  # ollama_data:
