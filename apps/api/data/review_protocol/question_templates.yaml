# question_templates.yaml — 19 专业问题模板 + 对象级模板
#
# 自动生成自「图纸会审认知蒸馏」（1909 条真实会审记录，19 专业）。
# 来源：
#   - ~/work/031 图纸会审/03 整理数据库/06_认知蒸馏/06_Agent技能规范.md（第7节）
#   - ~/work/031 图纸会审/03 整理数据库/06_认知蒸馏/05_专业审图清单SOP.md（问题导向生成规则 + 对象级问题模板）
# schema 见 core/ai_review/review_audit/CONTRACT.md 第1节。
#
# 占位符：原文模板中的 `______` 统一替换为 `{对象}`（首/主空位）或 `{待明确}`（补充/明确空位），
#         Python str.format 风格，缺值填空字符串。`[CODE/名称/级别]` 前缀原样保留。
# problem.type ∈ 一致性 | 闭合性 | 接口冲突 | 施工验收
# object key = 对象名，value = 对象级模板句。

