# location_patterns.yaml — 定位信息抽取正则
#
# 自动生成自「图纸会审认知蒸馏」（1909 条真实会审记录，19 专业）。
# 来源 / 设计依据：
#   - core/ai_review/review_audit/CONTRACT.md 第1节（patterns schema 与示例）
#   - ~/work/031 图纸会审/03 整理数据库/06_认知蒸馏/05_专业审图清单SOP.md
#     「定位信息是否完整」检查项（图号/层位/轴线/节点号/系统编号/房间名称/设备名称）
#
# 每条正则均为单引号字符串，确保 yaml 解析安全（单引号内仅 '' 需转义，本表无单引号）。
# 6 类 key（外加 equipment）：drawings / levels / axes / nodes_or_systems / spaces / equipment
# 正则面向中文图纸语境，供 Python re 模块直接使用。

patterns:
  # 图号：JS-101 / JD101 / 结施-12 / 建施12 / 图号：xxx
  drawings:
    - '[A-Za-z]{1,4}-?\d{2,4}(?:-\d{1,3})?'
    - '[结建水电暖通钢人防总景]{1,3}施[一-龥]?-?\d{1,4}'
    - '图号[:：]?\s*[A-Za-z\d\-－]{2,12}'
    - '第\s*\d{1,4}\s*[页张]'

  # 层位：地下二层 / B2 / 三层 / 3F / 屋面 / 标准层 / 夹层
  levels:
    - '地下\s*[一二三四五六七八九十\d]+\s*层'
    - '地上\s*[一二三四五六七八九十\d]+\s*层'
    - '[B|b]\d{1,2}\b'
    - '\d{1,3}\s*[Ff]\b'
    - '第?\s*[一二三四五六七八九十\d]+\s*层'
    - '屋面|屋顶|塔楼层|裙楼层|标准层|设备层|避难层|夹层|架空层|首层|地面层'

  # 轴线：①~⑤轴 / 1-5轴 / A轴 / A~D轴 / 交A轴
  axes:
    - '[\dA-Za-z①-⑳㉑-㉟]+\s*[~～\-－至]\s*[\dA-Za-z①-⑳㉑-㉟]+\s*轴'
    - '[A-Za-z①-⑳]{1,3}\s*轴(?:线)?'
    - '\d{1,3}\s*轴(?:线)?'
    - '交\s*[\dA-Za-z①-⑳]+\s*轴'

  # 节点号 / 系统编号：节点3 / 节点详图① / WS1系统 / AHU-1 / 系统编号
  nodes_or_systems:
    - '节点\s*[\d①-⑳]{1,3}'
    - '节点详图\s*[\dA-Za-z①-⑳]{0,3}'
    - '[A-Z]{1,4}-?\d{1,3}\s*系统'
    - '[一-龥]{1,6}系统'
    - '系统[编号图]\s*[A-Za-z\d\-]{1,8}'

  # 房间 / 区域：泵房 / 配电间 / 机房 / 楼梯间 / 卫生间 / 变电所
  spaces:
    - '机房|泵房|风机房|水泵房|消防泵房|生活泵房'
    - '配电间|配电室|变电所|变配电室|开关站|发电机房'
    - '卫生间|盥洗室|厨房|茶水间|管井|强电井|弱电井|管道井'
    - '楼梯间|前室|电梯井|电梯厅|候梯厅|核心筒'
    - '车库|车道|坡道|出入口|人防口部|风井|采光井'

  # 设备名称：水泵 / 风机 / 冷水机组 / 配电箱 / 喷淋泵 / AHU
  equipment:
    - '[一-龥]{0,4}(?:水泵|喷淋泵|消火栓泵|增压泵|潜污泵|稳压泵)'
    - '[一-龥]{0,4}(?:风机|送风机|排风机|排烟风机|新风机组|空调机组)'
    - '[一-龥]{0,4}(?:冷水机组|冷却塔|换热器|水箱|膨胀水箱|集水坑)'
    - '[一-龥]{0,4}(?:配电箱|配电柜|开关柜|变压器|控制箱|动力箱)'
    - '[A-Z]{2,4}-?\d{1,3}'
