    priority_concerns: [标高, 节点, 连接]
    default_interfaces: [结构, 给排水, 建筑]
    risk_triggers:
      - 基坑安全
      - 止水体系不闭合
      - 支撑节点不清
      - 围护与主体结构冲突
      - 施工阶段无法实施
    objects:
      - {name: 支护体系, level: 部位级}
      - {name: 围檩/支撑/立柱桩, level: 部位级}

