disciplines:
  - code: ZH
    name_cn: 综合协调
    coarse: general
    priority_concerns: [标高, 做法, 尺寸]
    default_interfaces: [结构, 建筑, 给排水]
    risk_triggers:
      - 两个及以上专业图纸互相矛盾
      - 责任边界不清
      - 设计答复互相打架
      - 现场无法判定先后施工
    objects:
      - {name: 跨专业冲突点, level: 部位级}
      - {name: 责任边界, level: 部位级}

  - code: JG
    name_cn: 结构
    coarse: structure
    priority_concerns: [标高, 做法, 详图]
    default_interfaces: [结构, 建筑, 给排水]
    risk_triggers:
      - 标高冲突
      - 节点缺失
      - 洞口削弱构件
      - 构件尺寸与建筑机电不匹配
    objects:
      - {name: 梁、柱、板、墙、核心筒, level: 部位级}
      - {name: 节点锚固, level: 节点级}
      - {name: 洞口与预埋, level: 节点级}
      - {name: 结构标高与轴线, level: 部位级}

