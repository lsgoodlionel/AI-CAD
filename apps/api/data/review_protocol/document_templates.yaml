# document_templates.yaml — 文书口径模板（每专业 纪要口径 / 答复口径）
#
# 自动誊录自「图纸会审认知蒸馏」（1909 条真实会审记录，19 专业）。
# 来源：
#   - ~/work/031 图纸会审/03 整理数据库/06_认知蒸馏/06_Agent技能规范.md（第7节「纪要口径模板/答复口径模板」，最权威）
#   - ~/work/031 图纸会审/03 整理数据库/06_认知蒸馏/07_技能抽样验收报告.md（会审纪要/设计答复期望形态校验，含结论条目「当前按{场景}优先级处理…」）
# schema 见 core/ai_review/review_audit/CONTRACT.md 契约 V2 V2-1「document_templates.yaml」。
#
# 占位符（Python str.format 风格，缺值填空字符串）：
#   {对象}     主对象名      {concern} 核心 concern   {场景} 主场景名
#   {主责专业} 牵头责任专业  {接口专业} 复核接口专业  {待明确} 待设计明确内容
# 纪要口径 type：问题条目 | 责任条目 | 结论条目
# 答复口径 type：设计意图 | 执行依据 | 修订说明 | 闭环条件
# 各专业文书句式同构（蒸馏源「会议纪要条目/设计答复条目」），仅 {对象} 由对象识别填充。
# 严禁手工杜撰；如需修订请回到蒸馏源文件同步。

documents:
  ZH:
    纪要口径:
      - {type: 问题条目, text: "关于{对象}，经审查发现当前图纸在{concern}方面存在{场景}问题，按现图无法明确最终执行依据；请设计单位明确修订图纸、责任专业及闭环时间。"}
      - {type: 责任条目, text: "建议由{主责专业}牵头，{接口专业}复核，形成书面修订依据后关闭问题。"}
      - {type: 结论条目, text: "当前按{场景}优先级处理，如未补充图纸依据则问题不得关闭。"}
    答复口径:
      - {type: 设计意图, text: "关于{对象}问题，设计意图为解决其{concern}控制要求。"}
      - {type: 执行依据, text: "图纸执行依据以最新修订图及对应节点详图为准。"}
      - {type: 修订说明, text: "应在对应平面、节点、系统图中补充或统一表达，保证图间口径一致后执行。"}
      - {type: 闭环条件, text: "仍存在接口冲突时，应补充跨专业复核结果及最终版本图纸后再关闭。"}

