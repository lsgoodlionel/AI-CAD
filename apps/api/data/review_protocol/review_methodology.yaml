# ============================================================

# 稳定判断顺序（底层原则）：触发 -> 边界 -> 风险 -> 责任 -> 动作 -> 闭环
control_chain_order: [触发, 边界, 风险, 责任, 动作, 闭环]

# ── 五维审查框架（固定顺序，对应审查五步）───────────────────────────
dimensions:
  - name: 完整性
    principle: 完整性优先于美观性——图纸先要能干，再谈表达是否漂亮。
    signals: [缺页, 缺节点, 缺详图, 缺大样, 缺说明, 缺材料做法, 无大样, 无详图,
              版本不一, 旧版, 未下发, 未出图, 不完整, 缺失, 未明确, 未表达,
              未注明, 缺少, 无法明确, 待澄清]
    question: 图纸是否缺页、缺节点、缺详图、缺说明、缺材料做法；版本是否为最新下发版本；是否已完成审批会签；能否直接指导施工。
  - name: 界面一致性
    principle: 界面一致性优先于单专业正确——单张图没错，不代表系统没错。
    signals: [不一致, 矛盾, 打架, 冲突, 不符, 不匹配, 对不上, 接口, 跨专业,
              预留, 预埋, 留洞, 洞口, 套管, 标高冲突, 轴线偏差, 以哪张图为准]
    question: 相邻专业图纸之间是否一致；预留预埋、洞口、套管、标高、轴线、尺寸是否互相对得上；哪些界面必须联合会审确认。
  - name: 可施工性
    principle: 预留预埋前置——凡涉及后续不可逆返工的内容，必须前置确认。
    signals: [无法施工, 无法实施, 无法安装, 可施工, 施工顺序, 安装顺序, 工序,
              净空, 净高, 作业路径, 安装空间, 机具, 场地条件, 返工, 条件不足]
    question: 按图施工是否具备作业路径与安装空间；是否考虑施工顺序、机具条件和现场限制；是否存在不可逆返工风险点。
  - name: 验收可达性
    principle: 验收倒推设计——反向思考未来如何验收、谁来认可、需要什么证据。
    signals: [验收, 移交, 样板, 检测, 复试, 隐蔽, 专项验收, 消防验收, 人防验收,
              节能审查, 专项审查, 合规, 证据]
    question: 按图完成后是否满足验收标准和移交标准；是否需要样板、检测、复试、隐蔽或专项验收；验收证据如何在图纸阶段形成。
  - name: 闭环性
    principle: 责任链明确——任何审查意见都要能落到责任方、输出件和时间节点。
    signals: [责任, 答复, 确认, 跟踪, 关闭, 闭环, 联系单, RFI, 会签, 专题会,
              截止, 期限, 复核节点]
    question: 问题由谁提出、谁答复、谁确认、谁跟踪关闭；通过设计联系单、RFI、会签还是专题会闭环；不关闭是否阻断开工或穿插。

