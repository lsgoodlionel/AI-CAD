# ── 闭环四要素（缺任一 → 闭环不足，输出追问项）────────────────────────
closure_elements:
  责任方: [设计单位, 设计, 总包, 监理, 业主, 建设单位, 分包, 安装, 土建, 由谁, 负责]
  时限: [日前, 之前, 天内, 周内, 截止, 完成时间, 期限, 节点前, 月底前, 内完成]
  输出件: [详图, 联系单, 回复单, 答复单, 报告, 方案, 记录, 纪要, 修订图, 输出件, 书面]
  确认方式: [会签, 确认, 复核, 验收, 审批, 签字, 闭环, 关闭]

# 闭环缺失 → 追问模板（agent 原则：闭环不足必须输出追问项）
closure_followups:
  责任方: 该问题由哪一方负责答复与整改？请明确主责单位与配合单位。
  时限: 该问题的答复/补图/整改截止时间是什么？请给出明确时间节点。
  输出件: 该问题以什么文件闭环（修订图纸/设计答复单/联系单/纪要）？请明确输出件。
  确认方式: 该问题由谁复核确认、以何种方式（会签/验收/审批）关闭？请明确确认路径。
