# 蒸馏来源：~/work/031 图纸会审/06 方法论与AI原则/（4123 份工程会议纪要）
#   - drawing_review_core_principles.md   五步审查顺序 + 6 条底层原则
#   - drawing_review_question_book.md     五类问题集
#   - meeting_ai_agent_principles.md      六步控制链 + 闭环不足标记规则
#   - drawing_review_output_template.md   处理建议表（动作类型/责任方/配合方/输出件）+ 闭环要求
