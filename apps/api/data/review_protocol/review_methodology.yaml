# ── 动作类型（输出模板五类）→ 触发信号 ───────────────────────────────
action_types:
  补图: [缺详图, 缺节点, 缺大样, 无大样, 无详图, 缺说明, 缺材料做法, 补充详图,
         表达不完整, 表达不足, 缺失, 缺页]
  复核: [复核, 核对, 不一致, 矛盾, 冲突, 打架, 不符, 对不上, 版本]
  RFI: [澄清, 待明确, 未明确, 无法明确, 请设计明确, 设计答复]
  会签: [会签, 审批, 报审, 下发, 出图]
  专题协调: [跨专业, 多专业, 界面, 专题会, 联合会审, 责任边界, 协调]

# 动作类型 → 默认输出件（闭环证据）
action_outputs:
  补图: 节点详图与书面说明
  复核: 复核意见与修订图纸
  RFI: 设计答复单（RFI 回复）
  会签: 会签记录与正式版图纸
  专题协调: 专题会纪要与责任分工表

