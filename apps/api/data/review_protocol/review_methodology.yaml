  - {name: 图纸界面, weight: 2236, keywords: [界面, 接口, 跨专业, 图纸冲突, 预留预埋]}
  - {name: 基坑围护, weight: 1851, keywords: [基坑, 围护, 支撑, 降水, 监测, 桩基]}
