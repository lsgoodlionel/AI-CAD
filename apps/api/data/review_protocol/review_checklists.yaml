      输出口径: 输出本条问题的专业归属、审查边界和需同步联查的专业。
      升级: false
    - 检查项: 定位信息是否完整
      判断依据: 图号、层位、轴线、节点号、系统编号、房间名称、设备名称等定位信息。
      核查方法: 逐条抽取正文里的定位信息；缺少定位时，先补证据再分析实体冲突。
      常见冲突: 只有疑问没有坐标，导致无法核图、无法追责、无法复核。
      必问问题: 问题具体对应哪张图、哪个部位、哪个系统或哪个节点？
      输出口径: 输出可唯一定位问题的图纸坐标，不允许只保留抽象问题描述。
      升级: false
    - 检查项: 标高 检查
      判断依据: 总说明、平面图、系统图、剖面图、大样图中与 标高 相关的表达。
      核查方法: 并列核对不同图纸中 标高 的表达是否一致，判断是漏写、错写还是互相矛盾。
      常见冲突: 标高 在平面与节点、系统与说明之间不一致，或表达不足导致无法施工。
      必问问题: 标高 以哪张图为准，设计意图是什么，是否需要补充详图或说明？
      输出口径: 输出 标高 的现状冲突、图纸依据和待设计明确事项。
      升级: false
    - 检查项: 做法 检查
      判断依据: 建筑 相关节点、大样、做法表、材料表或构造说明。
      核查方法: 核对 做法 是否具有足够的构造、连接、收口或材料信息支撑施工落地。
      常见冲突: 做法 缺少细部表达、节点闭合不完整、做法与总说明不一致。
      必问问题: 做法 是否有对应节点编号、详图页码、材料做法或替代方案？
      输出口径: 输出 做法 的缺失点、需补充图纸和建议确认路径。
      升级: false
    - 检查项: 防水 与 尺寸 联合检查
      判断依据: 系统路径、预留预埋、空间占位、综合排布及与 建筑 的接口条件。
      核查方法: 把 防水 与 尺寸 放到接口图纸里一起看，判断是否会卡安装顺序、空间净空或责任边界。
      常见冲突: 本专业图纸自洽，但与接口专业图纸打架，或施工前提条件未建立。
      必问问题: 建筑 是否已提供前提条件，谁先提资，谁先改图，现场按什么顺序实施？
      输出口径: 输出接口冲突点、主责专业、配合专业和闭环动作。
      升级: true
    - 检查项: 施工可落地性检查
      判断依据: 安装顺序、预留预埋、吊装运输、检修空间、成品保护、验收条件。
      核查方法: 不只问图纸对不对，还要问现场能不能做、做完能不能验收、后续能不能维护。
      常见冲突: 图纸表达存在，但现场无法安装、无法封板、无法检修或无法通过专项验收。
      必问问题: 按现状施工最先卡住的环节是什么，是否需要调整顺序、空间或专项做法？
      输出口径: 输出施工障碍、触发后果和是否需要升级风险。
      升级: true
    - 检查项: 风险分级与升级触发
      判断依据: 涉及防火疏散、功能净高、门窗洞口尺寸、防水收口和幕墙收边的争议应快速升级。
      核查方法: 判断问题是否影响结构安全、系统功能、消防验收、专项审查、返工成本或责任边界。
      常见冲突: 把应升级的问题当一般答疑处理，导致后续返工或责任失控。
      必问问题: 该问题如果不立即明确，最可能影响的是安全、功能、工期、成本还是验收？
      输出口径: 输出高/中/低风险等级及触发原因，必要时升级为专题协调问题。
      升级: true
    closure_rules:
    - 对 标高、做法 类问题，默认动作不是“先记下来”，而是立即组织对应图纸、节点、大样和 建筑、结构 接口图形成证据组。
    - 若证据表明是图间冲突，闭环动作应至少包含：明确执行图、修订责任专业、修订图纸落点和关闭条件。
    - 若证据表明是施工落地问题，闭环动作应至少包含：确认施工前提、确认先后工序、确认预留预埋条件和现场实施边界。
    - 若证据表明会影响验收或系统功能，闭环动作应补充专项审查/验收口径，避免问题在末端才暴露。
    - 任何结论都必须能回答：建筑 当前问题改什么、谁来改、依据哪张图改、改完如何确认已经真正关闭。
