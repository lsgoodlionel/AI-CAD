# 自动生成：scripts/build_review_checklists.py
# 来源：06_认知蒸馏/05_专业审图清单SOP.md（19 专业 × 1909 条会审记录蒸馏）
# 请勿手改，规范更新后重跑脚本重新蒸馏。
checklists:
  DQ:
    name: 电气
    protected_result: 通过审查 电气 的 回路与供电路径、系统、配电、回路 和 电气、给排水 界面，提前识别会导致返工、返修、停工待料或重复协调的高代价问题。
    consequence_chain:
    - 若 系统、配电、回路 在图纸阶段未被识别，通常先表现为设计依据不统一，再发展为提资错误、下料错误、预留预埋偏差或施工顺序冲突。
    - 若继续带病进入现场，后果通常升级为局部返工、材料浪费、工序穿插被打断、专业扯皮或责任边界失控。
    - 若问题进一步进入系统调试或专项验收阶段，影响会扩展为功能失败、验收不过、工期拖延和成本追加。
    - 对 电气 专业，真正高价值的问题不是“哪里写得不清”，而是“哪里会在未来把人、料、机、工序和验收同时卡住”。
    checklist:
    - 检查项: 专业归属与审查范围
      判断依据: 标题、专业代码、设计说明、问题主语是否与 电气 一致。
      核查方法: 先确认这是本专业主责问题还是综合协调问题，再决定回看哪套图纸。
      常见冲突: 专业归属不清、标题与正文主语不一致、实际问题跨专业但被误归单专业。
      必问问题: 当前问题主责专业是谁，配合专业是谁，是否已经存在跨专业会审结论？
      输出口径: 输出本条问题的专业归属、审查边界和需同步联查的专业。
      升级: false
    - 检查项: 定位信息是否完整
      判断依据: 图号、层位、轴线、节点号、系统编号、房间名称、设备名称等定位信息。
      核查方法: 逐条抽取正文里的定位信息；缺少定位时，先补证据再分析实体冲突。
      常见冲突: 只有疑问没有坐标，导致无法核图、无法追责、无法复核。
      必问问题: 问题具体对应哪张图、哪个部位、哪个系统或哪个节点？
      输出口径: 输出可唯一定位问题的图纸坐标，不允许只保留抽象问题描述。
      升级: false
    - 检查项: 系统 检查
      判断依据: 总说明、平面图、系统图、剖面图、大样图中与 系统 相关的表达。
      核查方法: 并列核对不同图纸中 系统 的表达是否一致，判断是漏写、错写还是互相矛盾。
      常见冲突: 系统 在平面与节点、系统与说明之间不一致，或表达不足导致无法施工。
      必问问题: 系统 以哪张图为准，设计意图是什么，是否需要补充详图或说明？
      输出口径: 输出 系统 的现状冲突、图纸依据和待设计明确事项。
      升级: false
    - 检查项: 配电 检查
      判断依据: 电气 相关节点、大样、做法表、材料表或构造说明。
      核查方法: 核对 配电 是否具有足够的构造、连接、收口或材料信息支撑施工落地。
      常见冲突: 配电 缺少细部表达、节点闭合不完整、做法与总说明不一致。
      必问问题: 配电 是否有对应节点编号、详图页码、材料做法或替代方案？
      输出口径: 输出 配电 的缺失点、需补充图纸和建议确认路径。
      升级: false
    - 检查项: 回路 与 套管 联合检查
      判断依据: 系统路径、预留预埋、空间占位、综合排布及与 电气 的接口条件。
      核查方法: 把 回路 与 套管 放到接口图纸里一起看，判断是否会卡安装顺序、空间净空或责任边界。
      常见冲突: 本专业图纸自洽，但与接口专业图纸打架，或施工前提条件未建立。
      必问问题: 电气 是否已提供前提条件，谁先提资，谁先改图，现场按什么顺序实施？
      输出口径: 输出接口冲突点、主责专业、配合专业和闭环动作。
      升级: true
    - 检查项: 施工可落地性检查
      判断依据: 安装顺序、预留预埋、吊装运输、检修空间、成品保护、验收条件。
      核查方法: 不只问图纸对不对，还要问现场能不能做、做完能不能验收、后续能不能维护。
      常见冲突: 图纸表达存在，但现场无法安装、无法封板、无法检修或无法通过专项验收。
      必问问题: 按现状施工最先卡住的环节是什么，是否需要调整顺序、空间或专项做法？
      输出口径: 输出施工障碍、触发后果和是否需要升级风险。
      升级: true
    - 检查项: 风险分级与升级触发
      判断依据: 涉及回路缺项、供电路径不闭合、桥架规格不明、防雷接地做法不清、与机电或建筑空间冲突时应升级。
      核查方法: 判断问题是否影响结构安全、系统功能、消防验收、专项审查、返工成本或责任边界。
      常见冲突: 把应升级的问题当一般答疑处理，导致后续返工或责任失控。
      必问问题: 该问题如果不立即明确，最可能影响的是安全、功能、工期、成本还是验收？
      输出口径: 输出高/中/低风险等级及触发原因，必要时升级为专题协调问题。
      升级: true
    closure_rules:
    - 对 系统、配电 类问题，默认动作不是“先记下来”，而是立即组织对应图纸、节点、大样和 电气、给排水 接口图形成证据组。
    - 若证据表明是图间冲突，闭环动作应至少包含：明确执行图、修订责任专业、修订图纸落点和关闭条件。
    - 若证据表明是施工落地问题，闭环动作应至少包含：确认施工前提、确认先后工序、确认预留预埋条件和现场实施边界。
    - 若证据表明会影响验收或系统功能，闭环动作应补充专项审查/验收口径，避免问题在末端才暴露。
    - 任何结论都必须能回答：电气 当前问题改什么、谁来改、依据哪张图改、改完如何确认已经真正关闭。
