    consequence_chain:
    - 若 尺寸、轴线、可施工性 在图纸阶段未被识别，通常先表现为设计依据不统一，再发展为提资错误、下料错误、预留预埋偏差或施工顺序冲突。
    - 若继续带病进入现场，后果通常升级为局部返工、材料浪费、工序穿插被打断、专业扯皮或责任边界失控。
    - 若问题进一步进入系统调试或专项验收阶段，影响会扩展为功能失败、验收不过、工期拖延和成本追加。
    - 对 基坑 专业，真正高价值的问题不是“哪里写得不清”，而是“哪里会在未来把人、料、机、工序和验收同时卡住”。
    checklist:
    - 检查项: 专业归属与审查范围
