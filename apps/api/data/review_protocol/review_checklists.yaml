      判断依据: 综合协调 相关节点、大样、做法表、材料表或构造说明。
      核查方法: 核对 做法 是否具有足够的构造、连接、收口或材料信息支撑施工落地。
      常见冲突: 做法 缺少细部表达、节点闭合不完整、做法与总说明不一致。
      必问问题: 做法 是否有对应节点编号、详图页码、材料做法或替代方案？
      输出口径: 输出 做法 的缺失点、需补充图纸和建议确认路径。
      升级: false
    - 检查项: 尺寸 与 详图 联合检查
      判断依据: 系统路径、预留预埋、空间占位、综合排布及与 结构 的接口条件。
      核查方法: 把 尺寸 与 详图 放到接口图纸里一起看，判断是否会卡安装顺序、空间净空或责任边界。
      常见冲突: 本专业图纸自洽，但与接口专业图纸打架，或施工前提条件未建立。
      必问问题: 结构 是否已提供前提条件，谁先提资，谁先改图，现场按什么顺序实施？
      输出口径: 输出接口冲突点、主责专业、配合专业和闭环动作。
      升级: true
    - 检查项: 施工可落地性检查
      判断依据: 安装顺序、预留预埋、吊装运输、检修空间、成品保护、验收条件。
      核查方法: 不只问图纸对不对，还要问现场能不能做、做完能不能验收、后续能不能维护。
      常见冲突: 图纸表达存在，但现场无法安装、无法封板、无法检修或无法通过专项验收。
      必问问题: 按现状施工最先卡住的环节是什么，是否需要调整顺序、空间或专项做法？
      输出口径: 输出施工障碍、触发后果和是否需要升级风险。
      升级: true
    - 检查项: 风险分级与升级触发
      判断依据: 凡涉及两个及以上专业图纸互相矛盾、责任边界不清、设计答复互相打架、现场无法判定先后施工的事项，应直接升级为综合高风险。
      核查方法: 判断问题是否影响结构安全、系统功能、消防验收、专项审查、返工成本或责任边界。
      常见冲突: 把应升级的问题当一般答疑处理，导致后续返工或责任失控。
      必问问题: 该问题如果不立即明确，最可能影响的是安全、功能、工期、成本还是验收？
      输出口径: 输出高/中/低风险等级及触发原因，必要时升级为专题协调问题。
      升级: true
    closure_rules:
    - 对 标高、做法 类问题，默认动作不是“先记下来”，而是立即组织对应图纸、节点、大样和 结构、建筑 接口图形成证据组。
    - 若证据表明是图间冲突，闭环动作应至少包含：明确执行图、修订责任专业、修订图纸落点和关闭条件。
    - 若证据表明是施工落地问题，闭环动作应至少包含：确认施工前提、确认先后工序、确认预留预埋条件和现场实施边界。
    - 若证据表明会影响验收或系统功能，闭环动作应补充专项审查/验收口径，避免问题在末端才暴露。
    - 任何结论都必须能回答：综合协调 当前问题改什么、谁来改、依据哪张图改、改完如何确认已经真正关闭。
  ZJ:
    name: 桩基
    protected_result: 通过审查 桩基 的 桩位与桩型、标高、详图、连接 和 给排水、建筑 界面，提前识别会导致返工、返修、停工待料或重复协调的高代价问题。
    consequence_chain:
    - 若 标高、详图、连接 在图纸阶段未被识别，通常先表现为设计依据不统一，再发展为提资错误、下料错误、预留预埋偏差或施工顺序冲突。
    - 若继续带病进入现场，后果通常升级为局部返工、材料浪费、工序穿插被打断、专业扯皮或责任边界失控。
    - 若问题进一步进入系统调试或专项验收阶段，影响会扩展为功能失败、验收不过、工期拖延和成本追加。
    - 对 桩基 专业，真正高价值的问题不是“哪里写得不清”，而是“哪里会在未来把人、料、机、工序和验收同时卡住”。
    checklist:
    - 检查项: 专业归属与审查范围
      判断依据: 标题、专业代码、设计说明、问题主语是否与 桩基 一致。
      核查方法: 先确认这是本专业主责问题还是综合协调问题，再决定回看哪套图纸。
      常见冲突: 专业归属不清、标题与正文主语不一致、实际问题跨专业但被误归单专业。
      必问问题: 当前问题主责专业是谁，配合专业是谁，是否已经存在跨专业会审结论？
