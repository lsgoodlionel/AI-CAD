  JDQ:
    name: 机电综合
    protected_result: 通过审查 机电综合 的 综合标高、系统、标高、预留 和 给排水、电气 界面，提前识别会导致返工、返修、停工待料或重复协调的高代价问题。
    consequence_chain:
    - 若 系统、标高、预留 在图纸阶段未被识别，通常先表现为设计依据不统一，再发展为提资错误、下料错误、预留预埋偏差或施工顺序冲突。
    - 若继续带病进入现场，后果通常升级为局部返工、材料浪费、工序穿插被打断、专业扯皮或责任边界失控。
    - 若问题进一步进入系统调试或专项验收阶段，影响会扩展为功能失败、验收不过、工期拖延和成本追加。
    - 对 机电综合 专业，真正高价值的问题不是“哪里写得不清”，而是“哪里会在未来把人、料、机、工序和验收同时卡住”。
    checklist:
    - 检查项: 专业归属与审查范围
      判断依据: 标题、专业代码、设计说明、问题主语是否与 机电综合 一致。
      核查方法: 先确认这是本专业主责问题还是综合协调问题，再决定回看哪套图纸。
      常见冲突: 专业归属不清、标题与正文主语不一致、实际问题跨专业但被误归单专业。
      必问问题: 当前问题主责专业是谁，配合专业是谁，是否已经存在跨专业会审结论？
      输出口径: 输出本条问题的专业归属、审查边界和需同步联查的专业。
      升级: false
    - 检查项: 定位信息是否完整
      判断依据: 图号、层位、轴线、节点号、系统编号、房间名称、设备名称等定位信息。
      核查方法: 逐条抽取正文里的定位信息；缺少定位时，先补证据再分析实体冲突。
      常见冲突: 只有疑问没有坐标，导致无法核图、无法追责、无法复核。
      必问问题: 问题具体对应哪张图、哪个部位、哪个系统或哪个节点？
      输出口径: 输出可唯一定位问题的图纸坐标，不允许只保留抽象问题描述。
      升级: false
    - 检查项: 系统 检查
      判断依据: 总说明、平面图、系统图、剖面图、大样图中与 系统 相关的表达。
      核查方法: 并列核对不同图纸中 系统 的表达是否一致，判断是漏写、错写还是互相矛盾。
      常见冲突: 系统 在平面与节点、系统与说明之间不一致，或表达不足导致无法施工。
      必问问题: 系统 以哪张图为准，设计意图是什么，是否需要补充详图或说明？
      输出口径: 输出 系统 的现状冲突、图纸依据和待设计明确事项。
      升级: false
    - 检查项: 标高 检查
      判断依据: 机电综合 相关节点、大样、做法表、材料表或构造说明。
