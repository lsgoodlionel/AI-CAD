# 自动誊录自「图纸会审认知蒸馏」（1909 条真实会审记录，19 专业）。
# 来源：
#   - ~/work/031 图纸会审/03 整理数据库/06_认知蒸馏/06_Agent技能规范.md（第7节「场景模板」，最权威，逐字誊录）
#   - ~/work/031 图纸会审/03 整理数据库/06_认知蒸馏/05_专业审图清单SOP.md（施工落地/验收风险场景补充，如 MQ 收边收口）
